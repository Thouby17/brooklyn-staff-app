name: Build Android APK

# Fabrique l'APK à chaque push sur main, ou manuellement (bouton "Run workflow").
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installer Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Installer les dépendances npm
        run: npm ci

      - name: Synchroniser Capacitor
        run: npx cap sync android

      - name: Construire l'APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Publier l'APK téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: brooklyn-food-staff-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
