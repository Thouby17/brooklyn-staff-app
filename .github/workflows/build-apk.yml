name: Build Android APK

# Fabrique l'APK à chaque push sur main, ou manuellement (bouton "Run workflow").
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installer Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Installer les dépendances npm
        run: npm ci

      - name: Synchroniser Capacitor
        run: npx cap sync android

      # Reconstruit la clé de signature permanente depuis les secrets du repo.
      # Sans elle, les mises à jour in-app seraient refusées par Android
      # (signature différente à chaque build).
      - name: Préparer la clé de signature
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.p12
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Construire l'APK (release signé)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_FILE: /tmp/release.p12
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Publier l'APK téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: brooklyn-food-staff-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
